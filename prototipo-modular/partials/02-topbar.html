    <header class="topbar">

            <h1>Processo Ágil</h1>
            <small>Gestão contábil e fiscal</small>

        </div>

      <div class="topbar-right">
        <button type="button" class="theme-toggle tip-bottom" id="themeToggle" data-tip="Modo noturno" aria-label="Ativar modo noturno" aria-pressed="false">

            <div id="notifCertItems"></div>
            <button type="button" class="notif-item" data-notif="atraso"><strong>2 tarefas atrasadas</strong><span>Contas a Pagar · Folha</span></button>
            <button type="button" class="notif-item" data-notif="entrega"><strong>Entrega próxima</strong><span>DAS — 20/07</span></button>
          </div>
        </div>
        <button type="button" class="mail tip-bottom" data-tip="Mensagens" data-action="mensagens" aria-label="Mensagens">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>

            <div class="avatar-user" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                <circle cx="12" cy="7" r="4"/>

            <button type="button" role="menuitem" data-action="minha-conta">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

            <button type="button" role="menuitem" data-action="acesso-cliente" id="userMenuAcessoCliente">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
